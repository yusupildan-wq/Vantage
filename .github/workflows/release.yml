name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Test and build backend
        working-directory: backend
        run: |
          npm ci
          npm test
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          printf 'VITE_API_URL=\nVITE_API_KEY=\n' > .env
          npm run build

      - name: Audit production dependencies
        run: |
          cd backend && npm audit --omit=dev --audit-level=high
          cd ../frontend && npm audit --omit=dev --audit-level=high

      - name: Package Windows executable
        working-directory: backend
        run: npm run package

      - name: Create release zip
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p release
          cp vantage.exe release/
          cp -r frontend/dist release/public
          cp -r config release/config
          cp README.md release/
          printf 'GROQ_API_KEY=%s\nAI_DATA_CONSENT=true\n' "$GROQ_API_KEY" > release/.env
          cd release && zip -r "../vantage-${{ github.ref_name }}.zip" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vantage-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Download Vantage ${{ github.ref_name }}

            1. Download **`vantage-${{ github.ref_name }}.zip`** from the Assets section below
            2. Extract the zip anywhere on your machine
            3. Double-click **`vantage.exe`**
            4. Your browser opens automatically — enter your Azure credentials in the setup screen

            No Node.js, no Docker, no terminals required.

            > **Windows security warning:** If you see "Windows protected your PC", click **More info → Run anyway**. This is expected for apps that are not commercially code-signed.
